<!DOCTYPE html>
<html lang="id">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login Sistem Mahasiswa</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;

            background:linear-gradient(
                135deg,
                #667eea,
                #764ba2
            );
        }

        .login-card{

            width:100%;
            max-width:450px;

            background:rgba(255,255,255,0.15);

            backdrop-filter:blur(15px);

            border-radius:20px;

            padding:35px;

            box-shadow:0 8px 30px rgba(0,0,0,0.2);

            color:white;
        }

        .login-title{
            font-weight:bold;
            text-align:center;
            margin-bottom:25px;
        }

        .form-control{
            border-radius:12px;
            padding:12px;
        }

        .btn-login{
            border-radius:12px;
            font-weight:bold;
        }

        .logo{
            font-size:60px;
            text-align:center;
            margin-bottom:10px;
        }

    </style>

</head>
<body>

<div class="login-card">

    <div class="logo">
        🎓
    </div>

    <h2 class="login-title">
        Login Sistem Mahasiswa
    </h2>

    <form method="POST">

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            <div class="mb-3">
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert" style="background: rgba(220,38,38,0.15); border: 1px solid rgba(220,38,38,0.25); color: white;">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                {% endfor %}
            </div>
        {% endif %}
        {% endwith %}

        <div class="mb-3">


            <input
                type="text"
                name="username"
                class="form-control"
                placeholder="Username"
                required
            >

        </div>

        <div class="mb-3">

            <input
                type="password"
                name="password"
                class="form-control"
                placeholder="Password"
                required
            >

        </div>

        <button
            type="submit"
            class="btn btn-primary w-100 btn-login"
        >
            Login
        </button>

    </form>

    <hr>

    <a
        href="/register"
        class="btn btn-success w-100"
    >
        Buat Akun Baru
    </a>

</div>

</body>
</html>
