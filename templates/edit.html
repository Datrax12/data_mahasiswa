```html
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Mahasiswa</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background: linear-gradient(135deg,#667eea,#764ba2);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .edit-card{
            width:100%;
            max-width:650px;
            border:none;
            border-radius:25px;
            overflow:hidden;
            background:white;
            box-shadow:0 15px 35px rgba(0,0,0,0.2);
            animation:muncul 0.5s ease;
        }

        @keyframes muncul{
            from{
                opacity:0;
                transform:translateY(30px);
            }
            to{
                opacity:1;
                transform:translateY(0);
            }
        }

        .header{
            background:linear-gradient(135deg,#0d6efd,#4f9cff);
            color:white;
            padding:25px;
            text-align:center;
        }

        .avatar{
            width:120px;
            height:120px;
            border-radius:50%;
            object-fit:cover;
            border:5px solid white;
            margin-top:-60px;
            background:white;
            box-shadow:0 5px 15px rgba(0,0,0,0.2);
        }

        .form-control{
            border-radius:12px;
            padding:12px;
        }

        .btn{
            border-radius:12px;
            transition:0.3s;
        }

        .btn:hover{
            transform:translateY(-2px);
        }

        .btn:active{
            transform:scale(0.95);
        }

    </style>
</head>

<body>

<div class="edit-card">

    <div class="header">
        <h2>✏️ Edit Data Mahasiswa</h2>
        <p class="mb-0">Perbarui data mahasiswa dengan mudah</p>
    </div>

    <div class="text-center">

        {% if mahasiswa.foto %}

        <img
            src="{{ url_for('static', filename='uploads/' + mahasiswa.foto) }}"
            class="avatar"
        >

        {% else %}

        <img
            src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png"
            class="avatar"
        >

        {% endif %}

    </div>

    <div class="p-4">

        <form method="POST">

            <div class="mb-3">

                <label class="form-label">
                    NIM
                </label>

                <input
                    type="text"
                    class="form-control"
                    value="{{ mahasiswa.nim }}"
                    readonly
                >

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Nama Mahasiswa
                </label>

                <input
                    type="text"
                    name="nama"
                    class="form-control"
                    value="{{ mahasiswa.nama }}"
                    required
                >

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Jurusan
                </label>

                <input
                    type="text"
                    name="jurusan"
                    class="form-control"
                    value="{{ mahasiswa.jurusan }}"
                    required
                >

            </div>

            <div class="d-grid gap-2">

                <button
                    type="submit"
                    class="btn btn-success btn-lg"
                >
                    💾 Simpan Perubahan
                </button>

                <a
                    href="/mahasiswa"
                    class="btn btn-secondary"
                >
                    ⬅ Kembali
                </a>

            </div>

        </form>

    </div>

</div>

</body>
</html>
```
